http_port: 8888          # HTTP port for serving display.html / control.html in browser
ws_port: 8765            # WebSocket port (HTML clients connect here)
fetch_interval: 60       # API fetch interval in seconds. 60 = every 1 minute.
api_url: ""              # API endpoint for messages/orders (leave empty to use sample data)
api_headers: {}          # Extra headers sent with each request. E.g. {"X-App": "tpos"}
# Tag states are saved to data/broadcast/tags.json (persists across restarts).

gsheets:
  enabled: true
  credentials_file: "broadcast_order/config/gsheets_credentials.json"  # Service Account JSON key file (relative to project root)
  spreadsheet_id: "1pMEWw-661XgZB5mF7-8APf6BvQeqMnqBZ-_3g3bMOVI"  # Google Spreadsheet ID (from URL)
  sheet_name: "Broadcast"                        # Target worksheet name
