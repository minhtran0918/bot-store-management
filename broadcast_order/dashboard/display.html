<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Màn hình theo dõi đơn hàng</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---- Header ---- */
  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .shop-name {
    font-size: 18px;
    font-weight: 700;
    color: #58a6ff;
    letter-spacing: 0.5px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: #8b949e;
  }
  .ws-badge {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .ws-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f85149;
    transition: background 0.3s;
  }
  .ws-dot.connected { background: #3fb950; }
  #clock { font-variant-numeric: tabular-nums; }

  /* ---- Table wrapper ---- */
  .table-wrap {
    flex: 1;
    overflow: auto;
    padding: 16px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: #161b22;
    color: #8b949e;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.8px;
    padding: 10px 12px;
    text-align: left;
    position: sticky;
    top: 0;
    border-bottom: 2px solid #30363d;
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid #21262d;
    transition: background 0.15s;
  }
  tbody tr:hover { background: #1c2128; }
  tbody td {
    padding: 10px 12px;
    vertical-align: top;
  }

  /* Row highlight states */
  tr.row-red    { background: rgba(248, 81, 73, 0.12); }
  tr.row-yellow { background: rgba(210, 153, 34, 0.12); }
  tr.row-dimmed { opacity: 0.45; }
  tr.row-red:hover    { background: rgba(248, 81, 73, 0.18); }
  tr.row-yellow:hover { background: rgba(210, 153, 34, 0.18); }

  /* Priority badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-high   { background: #3d0c10; color: #f85149; }
  .badge-normal { background: #1c2d3c; color: #58a6ff; }
  .badge-low    { background: #1c2d1c; color: #3fb950; }

  /* Status badges */
  .badge-pending    { background: #21262d; color: #8b949e; }
  .badge-processing { background: #1c2d3c; color: #58a6ff; }
  .badge-done       { background: #1c2d1c; color: #3fb950; }

  /* Unread time */
  .unread-ok     { color: #3fb950; }
  .unread-warn   { color: #d29922; }
  .unread-alert  { color: #e3a03c; }
  .unread-danger { color: #f85149; font-weight: 700; }

  /* Message bubbles */
  .msg-list { display: flex; flex-direction: column; gap: 4px; min-width: 180px; max-width: 280px; }
  .bubble {
    padding: 4px 8px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.4;
    max-width: 100%;
    word-break: break-word;
  }
  .bubble-customer {
    background: #21262d;
    color: #c9d1d9;
    align-self: flex-start;
    border-bottom-left-radius: 3px;
  }
  .bubble-shop {
    background: #1f3a5f;
    color: #a5d3ff;
    align-self: flex-end;
    border-bottom-right-radius: 3px;
    text-align: right;
  }
  .bubble-meta {
    font-size: 10px;
    color: #8b949e;
    margin-bottom: 1px;
  }
  .no-msg { color: #484f58; font-style: italic; font-size: 12px; }

  /* Time relative */
  .time-rel { white-space: nowrap; color: #8b949e; font-size: 12px; }

  .ref-code { font-family: monospace; color: #58a6ff; font-size: 13px; }
  .customer-name { font-weight: 600; }
  .assigned-name { color: #8b949e; }
  .note-text { color: #8b949e; font-size: 12px; max-width: 160px; word-break: break-word; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #484f58;
    font-size: 15px;
  }
</style>
</head>
<body>
<header>
  <div class="shop-name" id="shopName">Đang tải...</div>
  <div class="header-right">
    <span id="monitorCount">0 đơn</span>
    <div class="ws-badge">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsStatus">Đang kết nối...</span>
    </div>
    <span id="clock">--:--:--</span>
  </div>
</header>

<div class="table-wrap">
  <table id="monitorTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Mã đơn</th>
        <th>Khách hàng</th>
        <th>Ngày xuất</th>
        <th>Ưu tiên</th>
        <th>Trạng thái</th>
        <th>Phụ trách</th>
        <th>Tin nhắn (3 mới nhất)</th>
        <th>Khách nhắn lúc</th>
        <th>Chưa rep</th>
        <th>Ghi chú</th>
      </tr>
    </thead>
    <tbody id="monitorBody">
      <tr><td colspan="11" class="empty-state">Đang kết nối...</td></tr>
    </tbody>
  </table>
</div>

<script>
const WS_PORT = 8765;
let ws = null;
let state = { monitors: {}, messages: {}, staff: [], user_info: {} };

// ---- Clock ----
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('vi-VN');
}
setInterval(updateClock, 1000);
updateClock();

// ---- WebSocket ----
function connect() {
  ws = new WebSocket(`ws://${location.hostname}:${WS_PORT}`);

  ws.onopen = () => {
    document.getElementById('wsDot').classList.add('connected');
    document.getElementById('wsStatus').textContent = 'Đã kết nối';
  };

  ws.onmessage = (e) => {
    const { event, data } = JSON.parse(e.data);
    if (event === 'update') {
      state = data;
      render();
    }
  };

  ws.onclose = () => {
    document.getElementById('wsDot').classList.remove('connected');
    document.getElementById('wsStatus').textContent = 'Mất kết nối';
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}
connect();

// ---- Formatting helpers ----
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const HH = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  const DD = String(d.getDate()).padStart(2, '0');
  const MM = String(d.getMonth() + 1).padStart(2, '0');
  const YY = String(d.getFullYear()).slice(2);
  return `${HH}:${mm} ${DD}/${MM}/${YY}`;
}

function relTime(iso) {
  if (!iso) return '—';
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return '< 1 phút';
  if (diff < 3600) return `${Math.floor(diff / 60)} phút trước`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} giờ trước`;
  return `${Math.floor(diff / 86400)} ngày trước`;
}

function priorityBadge(p) {
  const map = { high: ['badge-high', '🔴 Cao'], normal: ['badge-normal', '🟡 Thường'], low: ['badge-low', '🟢 Thấp'] };
  const [cls, label] = map[p] || map.normal;
  return `<span class="badge ${cls}">${label}</span>`;
}

function statusBadge(s) {
  const map = { pending: ['badge-pending', 'Chưa xử lý'], processing: ['badge-processing', 'Đang xử lý'], done: ['badge-done', 'Hoàn tất'] };
  const [cls, label] = map[s] || map.pending;
  return `<span class="badge ${cls}">${label}</span>`;
}

function unreadHtml(mins, needsReply) {
  if (!needsReply || mins == null) return '<span class="unread-ok">—</span>';
  if (mins < 1) return '<span class="unread-ok">< 1 phút</span>';
  const txt = mins >= 60 ? `${Math.round(mins)} phút` : `${Math.round(mins)} phút`;
  if (mins > 60) return `<span class="unread-danger">${txt}</span>`;
  if (mins > 30) return `<span class="unread-alert">${txt}</span>`;
  return `<span class="unread-warn">${txt}</span>`;
}

function bubblesHtml(msgs) {
  if (!msgs || !msgs.length) return '<div class="no-msg">Chưa có tin nhắn</div>';
  const top3 = msgs.slice(0, 3);
  return `<div class="msg-list">${top3.map(m => {
    const cls = m.IsOwner ? 'bubble-shop' : 'bubble-customer';
    const who = m.IsOwner ? 'Shop' : 'Khách';
    const t = m.CreatedTime ? fmtDate(m.CreatedTime) : '';
    const text = (m.Message || '').substring(0, 80);
    return `<div class="bubble-meta">${who} · ${t}</div><div class="bubble ${cls}">${escHtml(text)}</div>`;
  }).join('')}</div>`;
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- Render ----
function render() {
  // Shop name
  const info = state.user_info || {};
  const company = (info.Company && info.Company.Name) ? info.Company.Name : 'Dashboard';
  document.getElementById('shopName').textContent = company;

  const monitors = state.monitors || {};
  const messages = state.messages || {};

  // Sort: needs_reply DESC, unread_duration_mins DESC
  const entries = Object.values(monitors).sort((a, b) => {
    if (b.needs_reply !== a.needs_reply) return b.needs_reply ? 1 : -1;
    return (b.unread_duration_mins || 0) - (a.unread_duration_mins || 0);
  });

  document.getElementById('monitorCount').textContent = `${entries.length} đơn`;

  const tbody = document.getElementById('monitorBody');
  if (!entries.length) {
    tbody.innerHTML = '<tr><td colspan="11" class="empty-state">Chưa có đơn nào đang theo dõi</td></tr>';
    return;
  }

  tbody.innerHTML = entries.map((m, i) => {
    let rowCls = '';
    if (m.status === 'done') rowCls = 'row-dimmed';
    else if (m.needs_reply && (m.unread_duration_mins || 0) > 60) rowCls = 'row-red';
    else if (m.needs_reply) rowCls = 'row-yellow';

    const msgs = messages[m.facebook_id] || [];
    return `<tr class="${rowCls}">
      <td>${i + 1}</td>
      <td class="ref-code">${escHtml(m.reference)}</td>
      <td class="customer-name">${escHtml(m.partner_name)}</td>
      <td>${fmtDate(m.date_invoice)}</td>
      <td>${priorityBadge(m.priority)}</td>
      <td>${statusBadge(m.status)}</td>
      <td class="assigned-name">${escHtml(m.assigned_to) || '—'}</td>
      <td>${bubblesHtml(msgs)}</td>
      <td class="time-rel">${relTime(m.last_customer_msg_time)}</td>
      <td>${unreadHtml(m.unread_duration_mins, m.needs_reply)}</td>
      <td class="note-text">${escHtml(m.note) || ''}</td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
