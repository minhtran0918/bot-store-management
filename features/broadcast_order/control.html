<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Control Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1117; --surface:#161a24; --surface2:#1c2130; --border:#232840;
    --accent:#00e5a0; --accent2:#ff6b6b; --accent3:#ffd166; --accent4:#5b9cf6;
    --text:#e8eaf2; --dim:#6b7280; --muted:#3d4455;
    --ok:#00e5a0; --pending:#ffd166; --cancel:#ff6b6b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Be Vietnam Pro',sans-serif;min-height:100vh}

  /* Header */
  .hdr{background:rgba(15,17,23,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .hdr-title{font-family:'Space Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:.06em;text-transform:uppercase}
  .conn-badge{display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid var(--border)}
  .conn-badge.connected{color:var(--ok);border-color:rgba(0,229,160,.3)}
  .conn-badge.disconnected{color:var(--accent2);border-color:rgba(255,107,107,.3)}
  .cdot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* Filters */
  .filters{padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .filters::-webkit-scrollbar{display:none}
  .fbtn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;letter-spacing:.05em;text-transform:uppercase}
  .fbtn.active{background:rgba(0,229,160,.1);border-color:rgba(0,229,160,.3);color:var(--ok)}
  .fbtn.f-pending.active{background:rgba(255,209,102,.1);border-color:rgba(255,209,102,.3);color:var(--pending)}
  .fbtn.f-cancel.active{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.3);color:var(--cancel)}

  /* Stats row */
  .srow{display:flex;gap:1px;background:var(--border)}
  .sitem{flex:1;background:var(--surface);padding:8px 10px;text-align:center}
  .sv{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;display:block}
  .sl{font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:1px;display:block}
  .sm .sv{color:var(--accent4)} .sc .sv{color:var(--ok)} .so .sv{color:var(--pending)} .stg .sv{color:var(--accent2)}

  /* Feed */
  .feed{padding:10px 10px 80px}

  /* Card */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
  .card.tag-ok{border-left:3px solid var(--ok)}
  .card.tag-pending{border-left:3px solid var(--pending)}
  .card.tag-cancel{border-left:3px solid var(--cancel)}
  .card-inner{padding:12px 14px}
  .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
  .card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .ttag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:3px}
  .ttag.comment{background:rgba(0,229,160,.1);color:var(--ok);border:1px solid rgba(0,229,160,.2)}
  .ttag.message{background:rgba(91,156,246,.1);color:var(--accent4);border:1px solid rgba(91,156,246,.2)}
  .sender{font-size:13px;font-weight:600} .sender.shop{color:var(--accent4)}
  .ctime{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0}
  .msg{font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word;color:#c0c8dc}
  .msg.cmt-msg{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--ok)}
  .order-badge{display:inline-flex;align-items:center;gap:5px;margin-top:7px;padding:4px 8px;background:rgba(255,209,102,.06);border:1px solid rgba(255,209,102,.15);border-radius:4px;font-family:'Space Mono',monospace;font-size:11px;color:var(--pending)}
  .src-post{margin-top:6px;padding:4px 8px;background:var(--surface2);border-radius:4px;font-size:11px;color:var(--muted);border-left:2px solid var(--border)}

  /* Tag buttons */
  .tag-actions{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .tbtn{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:6px;border:1px solid;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;background:transparent}
  .tbtn:active{transform:scale(.95)}
  .tbtn.ok{color:var(--ok);border-color:rgba(0,229,160,.3)} .tbtn.ok.active,.tbtn.ok:hover{background:rgba(0,229,160,.12);border-color:var(--ok)}
  .tbtn.pending{color:var(--pending);border-color:rgba(255,209,102,.3)} .tbtn.pending.active,.tbtn.pending:hover{background:rgba(255,209,102,.12);border-color:var(--pending)}
  .tbtn.cancel{color:var(--cancel);border-color:rgba(255,107,107,.3)} .tbtn.cancel.active,.tbtn.cancel:hover{background:rgba(255,107,107,.12);border-color:var(--cancel)}
  .tbtn.clear{color:var(--muted);border-color:var(--border)} .tbtn.clear:hover{background:var(--surface2);color:var(--dim)}

  /* Note input */
  .note-row{margin-top:8px;display:flex;gap:6px}
  .note-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;font-family:'Be Vietnam Pro',sans-serif;outline:none;transition:border-color .15s}
  .note-input:focus{border-color:rgba(0,229,160,.3)}
  .note-input::placeholder{color:var(--muted)}
  .note-save{padding:7px 14px;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);border-radius:6px;color:var(--ok);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
  .note-save:hover{background:rgba(0,229,160,.2)}

  /* Current tag display */
  .cur-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.05em;margin-top:8px}
  .cur-tag.ok{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);color:var(--ok)}
  .cur-tag.pending{background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.2);color:var(--pending)}
  .cur-tag.cancel{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.2);color:var(--cancel)}
  .cur-note{font-size:11px;color:var(--dim);margin-top:3px;font-style:italic}

  /* Search */
  .search-wrap{padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border)}
  .search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-size:13px;font-family:'Be Vietnam Pro',sans-serif;outline:none}
  .search-input:focus{border-color:rgba(0,229,160,.3)}
  .search-input::placeholder{color:var(--muted)}

  /* Empty */
  .empty{text-align:center;padding:50px 20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:12px}

  /* Note area toggle */
  .note-toggle{font-size:11px;color:var(--dim);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  .note-area{display:none}
  .note-area.open{display:flex}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-title">⚡ Control Panel</span>
  <div class="conn-badge disconnected" id="badge">
    <div class="cdot"></div>
    <span id="badge-txt">Offline</span>
  </div>
</div>

<div class="srow">
  <div class="sitem sm"><span class="sv" id="s-msg">—</span><span class="sl">Tin nhắn</span></div>
  <div class="sitem sc"><span class="sv" id="s-cmt">—</span><span class="sl">Bình luận</span></div>
  <div class="sitem so"><span class="sv" id="s-ord">—</span><span class="sl">Đơn hàng</span></div>
  <div class="sitem stg"><span class="sv" id="s-tag">—</span><span class="sl">Đã tag</span></div>
</div>

<div class="search-wrap">
  <input class="search-input" id="search" placeholder="🔍  Tìm theo nội dung, tên khách..." oninput="renderFeed()">
</div>

<div class="filters">
  <button class="fbtn active" data-filter="all" onclick="setFilter(this,'all')">Tất cả</button>
  <button class="fbtn" data-filter="comment" onclick="setFilter(this,'comment')">Comment</button>
  <button class="fbtn" data-filter="message" onclick="setFilter(this,'message')">Tin nhắn</button>
  <button class="fbtn f-pending" data-filter="tagged" onclick="setFilter(this,'tagged')">Đã tag</button>
  <button class="fbtn" data-filter="untagged" onclick="setFilter(this,'untagged')">Chưa tag</button>
  <button class="fbtn f-pending" data-filter="tag-pending" onclick="setFilter(this,'tag-pending')">⏳ Chờ</button>
  <button class="fbtn f-cancel" data-filter="tag-cancel" onclick="setFilter(this,'tag-cancel')">❌ Huỷ</button>
</div>

<div class="feed" id="feed">
  <div class="empty">⠋ Đang kết nối...</div>
</div>

<script>
const WS_URL = `ws://${location.hostname}:8765`;
let state = { messages: null, tags: {} };
let ws = null;
let activeFilter = 'all';
let noteInputs = {}; // id → note text

const esc = s => s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
const fmtTime = iso => { try { return new Date(iso).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',hour12:false}); } catch{ return '—'; }};

function getSender(item) {
  if (item.IsOwner) return item.ApplicationUser?.Name || 'Shop';
  return 'Khách hàng';
}

// ── Filter ────────────────────────────────────────────────────
function setFilter(el, f) {
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  activeFilter = f;
  renderFeed();
}

function filterItems(items) {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return items.filter(item => {
    const msg = (item.Message || '').toLowerCase();
    const sender = getSender(item).toLowerCase();
    const matchQ = !q || msg.includes(q) || sender.includes(q);
    if (!matchQ) return false;
    const tag = state.tags[item.Id];
    switch (activeFilter) {
      case 'all':         return true;
      case 'comment':     return item.Type === 'comment';
      case 'message':     return item.Type === 'message';
      case 'tagged':      return !!tag;
      case 'untagged':    return !tag;
      case 'tag-pending': return tag?.status === 'pending';
      case 'tag-cancel':  return tag?.status === 'cancel';
      default:            return true;
    }
  });
}

// ── Send tag action ───────────────────────────────────────────
function sendTag(id, status) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const note = noteInputs[id] || '';
  ws.send(JSON.stringify({ action: 'tag', id, status, note }));
}

function sendUntag(id) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ action: 'untag', id }));
}

// ── Render ────────────────────────────────────────────────────
function renderFeed() {
  const data = state.messages;
  const tags = state.tags;
  const feed = document.getElementById('feed');
  if (!data) return;

  const items = data.Data || [];
  document.getElementById('s-msg').textContent = items.filter(i=>i.Type==='message').length;
  document.getElementById('s-cmt').textContent = items.filter(i=>i.Type==='comment').length;
  document.getElementById('s-ord').textContent = items.reduce((a,i)=>a+(i.Order?.Count||0),0);
  document.getElementById('s-tag').textContent = Object.keys(tags).length;

  const filtered = filterItems(items);
  if (!filtered.length) { feed.innerHTML = '<div class="empty">Không có mục nào phù hợp</div>'; return; }

  let html = '';
  for (const item of filtered) {
    const tag = tags[item.Id];
    const isComment = item.Type === 'comment';
    const isOwner = item.IsOwner;
    const msg = item.Message || item.MessageFormatted || '';

    // Current tag
    let curTagHtml = '';
    if (tag) {
      const icons = {ok:'✅', pending:'⏳', cancel:'❌'};
      const labels = {ok:'OK', pending:'Đang chờ', cancel:'Đã huỷ'};
      curTagHtml = `<div class="cur-tag ${tag.status}">${icons[tag.status]} ${labels[tag.status]}</div>`;
      if (tag.note) curTagHtml += `<div class="cur-note">"${esc(tag.note)}"</div>`;
    }

    // Order
    let ordHtml = '';
    if (item.Order?.Count > 0) {
      const codes = (item.Order.Data||[]).map(o=>`#${o.Code}`).join(', ');
      ordHtml = `<div class="order-badge">🛒 ${esc(codes)}</div>`;
    }

    // Source
    let srcHtml = '';
    if (isComment && item.Object) {
      const camp = item.Object.LiveCampaign?.Name || '';
      srcHtml = `<div class="src-post">📺 ${esc(camp)}</div>`;
    }

    const cardClass = tag ? `card tag-${tag.status}` : 'card';
    const msgClass  = isComment ? 'msg cmt-msg' : 'msg';

    html += `
<div class="${cardClass}" data-id="${item.Id}" id="card-${item.Id}">
  <div class="card-inner">
    <div class="card-head">
      <div class="card-meta">
        <span class="ttag ${item.Type}">${item.Type}</span>
        <span class="sender ${isOwner?'shop':''}">${esc(getSender(item))}</span>
      </div>
      <span class="ctime">${fmtTime(item.CreatedTime)}</span>
    </div>
    ${msg ? `<div class="${msgClass}">${esc(msg)}</div>` : ''}
    ${srcHtml}${ordHtml}${curTagHtml}

    <div class="tag-actions">
      <button class="tbtn ok${tag?.status==='ok'?' active':''}" onclick="sendTag('${item.Id}','ok')">✅ OK</button>
      <button class="tbtn pending${tag?.status==='pending'?' active':''}" onclick="sendTag('${item.Id}','pending')">⏳ Chờ</button>
      <button class="tbtn cancel${tag?.status==='cancel'?' active':''}" onclick="sendTag('${item.Id}','cancel')">❌ Huỷ</button>
      ${tag ? `<button class="tbtn clear" onclick="sendUntag('${item.Id}')">✕ Xoá tag</button>` : ''}
      <span class="note-toggle" onclick="toggleNote('${item.Id}')">+ Ghi chú</span>
    </div>

    <div class="note-area" id="note-${item.Id}">
      <input class="note-input" placeholder="Ghi chú (VD: đã liên hệ, hẹn giờ...)"
        value="${esc(noteInputs[item.Id]||tag?.note||'')}"
        oninput="noteInputs['${item.Id}']=this.value"
        onkeydown="if(event.key==='Enter'){sendTag('${item.Id}',state.tags['${item.Id}']?.status||'ok')}">
      <button class="note-save" onclick="sendTag('${item.Id}',state.tags['${item.Id}']?.status||'ok')">Lưu</button>
    </div>
  </div>
</div>`;
  }

  feed.innerHTML = html;
}

function toggleNote(id) {
  const el = document.getElementById(`note-${id}`);
  if (el) el.classList.toggle('open');
}

// ── WebSocket ─────────────────────────────────────────────────
function setBadge(connected, txt) {
  const b = document.getElementById('badge');
  b.className = `conn-badge ${connected ? 'connected' : 'disconnected'}`;
  document.getElementById('badge-txt').textContent = txt;
}

function connect() {
  setBadge(false, 'Đang kết nối...');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => setBadge(true, 'Online');

  ws.onmessage = e => {
    try {
      const { event, data } = JSON.parse(e.data);
      if (event === 'update') { state.messages = data.messages; state.tags = data.tags || {}; }
      if (event === 'tags')   { state.tags = data; }
      renderFeed();
    } catch {}
  };

  ws.onclose = () => { setBadge(false, 'Offline'); setTimeout(connect, 5000); };
  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
